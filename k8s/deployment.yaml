# Companion API — Deployment with 2 replicas, resource requests (for HPA), and probes.
# Prerequisites:
#   1) kubectl works (Docker Desktop → Kubernetes running).
#   2) Secret companion-api-env exists.
#   3) For HPA: metrics-server (Docker Desktop K8s usually includes it). Check:
#        kubectl get deployment metrics-server -n kube-system
apiVersion: apps/v1
kind: Deployment
metadata:
  name: companion-api
  labels:
    app: companion-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: companion-api
  template:
    metadata:
      labels:
        app: companion-api
    spec:
      containers:
        - name: api
          image: maydog22/companion-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: companion-api-env
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
